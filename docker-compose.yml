services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${APP_ENV:-dev}
    container_name: luxbiss-api
    # In host mode, ports are shared with the host
    network_mode: host
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DB_HOST=127.0.0.1
      - DB_PORT=5432
      - REDIS_HOST=127.0.0.1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: luxbiss-postgres
    network_mode: host
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-luxbiss}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: luxbiss-redis
    network_mode: host
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
